<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>BlackStack Admin</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #050505;
            --panel: rgba(255, 255, 255, 0.03);
            --line: rgba(255, 255, 255, 0.08);
            --fg: #ffffff;
            --muted: #909090;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 30%),
                var(--bg);
            color: var(--fg);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .panel {
            width: min(100%, 760px);
            padding: clamp(24px, 4vw, 40px);
            border: 1px solid var(--line);
            border-radius: 28px;
            background: var(--panel);
            backdrop-filter: blur(18px);
        }

        .eyebrow {
            margin: 0 0 12px;
            font-size: 11px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--muted);
        }

        h1 {
            margin: 0;
            font-size: clamp(32px, 5vw, 56px);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        .lead {
            margin: 18px 0 36px;
            max-width: 56ch;
            font-size: 15px;
            line-height: 1.7;
            color: var(--muted);
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: clamp(24px, 4vw, 36px);
            background: rgba(0, 0, 0, 0.35);
        }

        .label {
            font-size: 11px;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .value {
            margin: 16px 0 10px;
            font-size: clamp(64px, 15vw, 140px);
            font-weight: 800;
            letter-spacing: -0.08em;
            line-height: 0.9;
        }

        .hint,
        .updated {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            color: var(--muted);
        }

        .updated {
            margin-top: 18px;
        }

        .actions {
            margin-top: 28px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            appearance: none;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--fg);
            border-radius: 999px;
            padding: 12px 18px;
            cursor: pointer;
            font: inherit;
        }

        button:hover {
            border-color: rgba(255, 255, 255, 0.24);
        }
    </style>
</head>
<body>
    <main class="panel">
        <p class="eyebrow">BlackStack / Admin</p>
        <h1>Посетители сайта</h1>
        <p class="lead">
            Здесь показывается количество уникальных посетителей, посчитанных по уникальным браузерам.
            Счётчик начинает собирать данные с момента включения этой админки.
        </p>

        <section class="card">
            <div class="label">Уникальные посетители</div>
            <div class="value" id="visitorCount">...</div>
            <p class="hint" id="statusText">Загружаю текущую статистику...</p>
            <p class="updated" id="updatedAt"></p>
        </section>

        <div class="actions">
            <button type="button" id="refreshBtn">Обновить</button>
        </div>
    </main>

    <script>
        const COUNTER_URL = "https://api.countapi.xyz/get/blackstackstudio-site/unique-visitors-v1";

        const countEl = document.getElementById("visitorCount");
        const statusEl = document.getElementById("statusText");
        const updatedEl = document.getElementById("updatedAt");
        const refreshBtn = document.getElementById("refreshBtn");

        async function loadStats() {
            countEl.textContent = "...";
            statusEl.textContent = "Загружаю текущую статистику...";

            try {
                const response = await fetch(COUNTER_URL, { cache: "no-store" });
                if (!response.ok) throw new Error("bad_response");
                const data = await response.json();
                const value = typeof data.value === "number" ? data.value : 0;

                countEl.textContent = new Intl.NumberFormat("ru-RU").format(value);
                statusEl.textContent = "Количество уникальных браузеров, которые уже заходили на сайт.";
                updatedEl.textContent = "Обновлено: " + new Date().toLocaleString("ru-RU");
            } catch (error) {
                countEl.textContent = "0";
                statusEl.textContent = "Пока данных нет или счётчик ещё не успел накопить посещения.";
                updatedEl.textContent = "Проверь ещё раз позже.";
            }
        }

        refreshBtn.addEventListener("click", loadStats);
        loadStats();
    </script>
</body>
</html>
